<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Room Builder</title>

    <link rel="stylesheet" href="./src/style.css">
  </head>
  <body>
    <div id="app">

      <canvas class="webgl"></canvas>


      <div class="actions">
        <button id="split-wall">Split Wall</button>
      </div>

      <div class="props-panel">
        <div class="panel-items-wrapper">
          <div class="panel-item" data-model="p_cube">
            Cube
          </div>
          <div class="panel-item" data-model="p_s_table">
            Table
          </div>
          <div class="panel-item" data-model="p_sphere">
            Sphere
          </div>
        </div>
      </div>

      <div class="buttons">
        <button id="button-2d">Floor Editing</button>
        <button id="button-3d">Room Editing</button>
      </div>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
